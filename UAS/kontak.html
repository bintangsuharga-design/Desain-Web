<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak Kami - FitLife Gym</title>
    <link rel="stylesheet" href="style.css">
    <style>
        form input, form textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>Fit<span>Life</span> Gym</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Beranda</a></li>
                    <li><a href="tentang.html">Tentang Kami</a></li>
                    <li><a href="program.html">Program</a></li>
                    <li><a href="harga.html">Paket Harga</a></li>
                    <li><a href="kontak.html" class="active">Kontak</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="container" style="padding: 60px 0;">
        <section class="contact">
            <div class="heading">
                <h2>Hubungi Kami</h2>
                <p>Punya pertanyaan? Kirim pesan langsung kepada tim kami.</p>
            </div>
            <div style="max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                <form action="#" method="POST" onsubmit="alert('Pesan Anda berhasil dikirim!'); return false;">
                    <label for="nama">Nama Lengkap</label>
                    <input type="text" id="nama" name="nama" placeholder="Masukkan nama Anda..." required>

                    <label for="email">Alamat Email</label>
                    <input type="email" id="email" name="email" placeholder="Masukkan email Anda..." required>

                    <label for="pesan">Pesan / Pertanyaan</label>
                    <textarea id="pesan" name="pesan" rows="5" placeholder="Tuliskan pesan Anda di sini..." required></textarea>

                    <button type="submit" class="btn" style="border: none; width: 100%; cursor: pointer;">Kirim Pesan</button>
                </form>
            </div>
        </section>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2026 FitLife Gym.</p>
        </div>
    </footer>
</body>
</html>
