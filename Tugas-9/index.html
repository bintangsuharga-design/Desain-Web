<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BubbleWash - Tailwind CSS Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: translateY(-50px) scale(0.9); }
            60% { opacity: 1; transform: translateY(10px) scale(1.02); }
            100% { transform: translateY(0) scale(1); }
        }
        @keyframes vibrate {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(2px, 1px) rotate(1.5deg); }
            50% { transform: translate(-1px, -1px) rotate(-1.5deg); }
            75% { transform: translate(1px, -2px) rotate(0deg); }
        }

        .animate-bounceIn {
            animation: bounceIn 1.2s ease forwards;
        }
        .animate-vibrate {
            animation: vibrate 0.5s infinite linear;
        }
    </style>
</head>
<body class="bg-sky-50 text-slate-800 min-height-screen flex flex-col">
    
</body>
